<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EIOSH — European Institute of Occupational Safety and Health</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="EIOSH — Occupational safety and health training, certification, and assessment.">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container { max-width: 700px; text-align: center; }
    .badge {
      display: inline-block; padding: 0.4rem 1rem; margin-bottom: 1.5rem;
      background: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.3);
      border-radius: 999px; font-size: 0.875rem; color: #38bdf8;
    }
    h1 { font-size: clamp(2rem, 5vw, 3.5rem); margin-bottom: 1rem; color: #f8fafc; }
    .tagline { font-size: 1.1rem; color: #94a3b8; margin-bottom: 3rem; max-width: 500px; margin-left: auto; margin-right: auto; line-height: 1.6; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .card {
      display: block; padding: 1.5rem 1rem; background: rgba(30, 41, 59, 0.6);
      border: 1px solid #334155; border-radius: 12px; text-decoration: none;
      color: #e2e8f0; transition: all 0.2s;
    }
    .card:hover { background: rgba(56, 189, 248, 0.1); border-color: #38bdf8; transform: translateY(-2px); }
    .card-title { font-size: 1.05rem; font-weight: 600; color: #f8fafc; margin-bottom: 0.25rem; }
    .card-desc { font-size: 0.85rem; color: #94a3b8; }
    footer { margin-top: 2rem; font-size: 0.85rem; color: #64748b; }
  </style>
</head>
<body>
  <div class="container">
    <span class="badge">Platform Online</span>
    <h1>EIOSH</h1>
    <p class="tagline">European Institute of Occupational Safety and Health — training, certification, and assessment platform.</p>
    <div class="grid">
      <a href="https://lms.eiosh.com/" class="card">
        <div class="card-title">Learning Portal</div>
        <div class="card-desc">Courses & training</div>
      </a>
      <a href="https://exam.eiosh.com/" class="card">
        <div class="card-title">Exams</div>
        <div class="card-desc">Assessments & certification</div>
      </a>
      <a href="https://invoice.eiosh.com/" class="card">
        <div class="card-title">Invoicing</div>
        <div class="card-desc">Billing & payments</div>
      </a>
    </div>
    <footer>&copy; <span id="year"></span> EIOSH. All rights reserved.</footer>
  </div>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
